services:
  mongo-db:
    image: mongo:8.0.14-noble
    container_name: mongo-db
    hostname: mongo-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    # ports:
    #   - "27017:27017"
    expose:
      - "27017"
    volumes:
      - ./docker/mongo/data:/data/db
      - ./docker/mongo/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--username", "${MONGO_USERNAME}", "--password", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - data_eng_net
      - mongo_net

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: mongo-express
    hostname: mongo-express
    environment:
      ME_CONFIG_MONGODB_URL: ${MONGO_URL}
      ME_CONFIG_BASICAUTH_ENABLED: ${MONGO_WEB_AUTH}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_WEB_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_WEB_PASSWORD}
    ports:
      - "8088:8081"
    networks:
      - data_eng_net
      - mongo_net
    depends_on:
      mongo-db:
        condition: service_healthy

networks:
  data_eng_net:
    external: true
  mongo_net:
    external: True
